<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia de San Valentín ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

.contenido {
  position: relative;
  z-index: 2;
  top: 40%;
  transform: translateY(-50%);
}

h1 {
  font-size: 35px;
}

p {
  font-size: 18px;
}

button {
  padding: 10px 20px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 20px;
  cursor: pointer;
  margin-top: 20px;
}

</style>
</head>

<body>

<canvas id="galaxy"></canvas>

<div class="contenido">
  <h1>🌌 Para ti ❤️</h1>
  <p>Eres mi universo entero</p>
  <button onclick="mostrar()">Haz clic aquí</button>
  <p id="mensaje" style="display:none;">Te amo muchísimo 💖</p>
</div>

<script>
const canvas = document.getElementById("galaxy");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";
  stars.forEach(star => {
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

draw();

function mostrar() {
  document.getElementById("mensaje").style.display = "block";
}
</script>

</body>
</html>
