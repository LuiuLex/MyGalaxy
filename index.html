<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>💖 Para Ti</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:sans-serif;
  color:white;
}

#text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
  z-index:10;
}

h1{font-size:30px;}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff2e63;
  color:white;
  cursor:pointer;
}

#msg{
  display:none;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="text">
  <h1>🌌 Para ti ❤️</h1>
  <button onclick="mostrar()">Abrir</button>
  <div id="msg">Eres mi universo 💖</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

let renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// 🌌 GALAXIA MEJORADA
let geometry = new THREE.BufferGeometry();
let vertices = [];
let colors = [];

for(let i=0;i<8000;i++){
  let radius = Math.random()*5;

  let angle = radius * 2;

  let x = Math.cos(angle)*radius;
  let y = (Math.random()-0.5)*2;
  let z = Math.sin(angle)*radius;

  vertices.push(x,y,z);

  // colores galaxia
  colors.push(1, Math.random()*0.3, Math.random()); // rosado/morado
}

geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices,3));
geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors,3));

let material = new THREE.PointsMaterial({
  size:0.03,
  vertexColors:true
});

let galaxy = new THREE.Points(geometry, material);
scene.add(galaxy);

camera.position.z = 6;

// 🎮 CONTROL
let mouseX=0, mouseY=0;

document.addEventListener("mousemove", e=>{
  mouseX = (e.clientX - window.innerWidth/2)*0.0005;
  mouseY = (e.clientY - window.innerHeight/2)*0.0005;
});

document.addEventListener("touchmove", e=>{
  mouseX = (e.touches[0].clientX - window.innerWidth/2)*0.0005;
  mouseY = (e.touches[0].clientY - window.innerHeight/2)*0.0005;
});

// 🎥 ANIMACIÓN
function animate(){
  requestAnimationFrame(animate);

  galaxy.rotation.y += 0.002 + mouseX;
  galaxy.rotation.x += 0.002 + mouseY;

  renderer.render(scene, camera);
}

animate();

// ❤️ MENSAJE
function mostrar(){
  document.getElementById("msg").style.display="block";
}
</script>

</body>
</html>
