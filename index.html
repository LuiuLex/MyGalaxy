<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>💖 Para Ti</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:sans-serif;
  color:white;
}

#text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
  z-index:10;
}

h1{
  font-size:35px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff2e63;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

#msg{
  display:none;
  margin-top:15px;
  font-size:20px;
}
</style>
</head>

<body>

<div id="text">
  <h1>🌌 Para ti ❤️</h1>
  <button onclick="mostrar()">Abrir</button>
  <div id="msg">Eres mi universo 💖✨</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Crear partículas (galaxia)
let geometry = new THREE.BufferGeometry();
let vertices = [];

for(let i=0;i<5000;i++){
  let x = (Math.random()-0.5)*10;
  let y = (Math.random()-0.5)*10;
  let z = (Math.random()-0.5)*10;
  vertices.push(x,y,z);
}

geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices,3));

let material = new THREE.PointsMaterial({
  color:0xffffff,
  size:0.02
});

let points = new THREE.Points(geometry, material);
scene.add(points);

camera.position.z = 5;

// Movimiento con mouse
let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove", (e)=>{
  mouseX = (e.clientX - window.innerWidth/2) * 0.0005;
  mouseY = (e.clientY - window.innerHeight/2) * 0.0005;
});

// Movimiento táctil
document.addEventListener("touchmove", (e)=>{
  mouseX = (e.touches[0].clientX - window.innerWidth/2) * 0.0005;
  mouseY = (e.touches[0].clientY - window.innerHeight/2) * 0.0005;
});

function animate(){
  requestAnimationFrame(animate);

  points.rotation.y += 0.001 + mouseX;
  points.rotation.x += 0.001 + mouseY;

  renderer.render(scene, camera);
}

animate();

// Mostrar mensaje
function mostrar(){
  document.getElementById("msg").style.display="block";
}
</script>

</body>
</html>
