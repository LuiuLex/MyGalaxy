<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>💖 Para Ti</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:black;
  overflow:hidden;
  font-family: 'Segoe UI', sans-serif;
  color:white;
}

/* CANVAS */
canvas{
  position:absolute;
  top:0;
  left:0;
}

/* CONTENIDO */
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
  z-index:2;
  opacity:0;
  animation:fadeIn 2s ease forwards;
  animation-delay:1s;
}

h1{
  font-size:38px;
  margin-bottom:10px;
}

p{
  font-size:18px;
  opacity:0.8;
}

button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#ff2e63;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#ff4d6d;
  transform:scale(1.1);
}

/* MENSAJE FINAL */
#final{
  display:none;
  margin-top:20px;
  font-size:22px;
  animation:fadeIn 1s ease forwards;
}

/* ANIMACIONES */
@keyframes fadeIn{
  from{opacity:0; transform:translate(-50%, -40%);}
  to{opacity:1; transform:translate(-50%, -50%);}
}
</style>
</head>

<body>

<canvas id="space"></canvas>

<div class="container">
  <h1>🌌 Para ti ❤️</h1>
  <p>Toca el botón...</p>
  <button onclick="showMessage()">Abrir sorpresa</button>
  <div id="final">Eres mi universo 💖✨</div>
</div>

<script>
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

// Crear estrellas
for(let i=0;i<300;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2,
    speed: Math.random()*0.5
  });
}

// Animación tipo “espacio en movimiento”
function animate(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="white";

  stars.forEach(star=>{
    star.y += star.speed;

    if(star.y > canvas.height){
      star.y = 0;
      star.x = Math.random()*canvas.width;
    }

    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

// Mostrar mensaje
function showMessage(){
  document.getElementById("final").style.display = "block";
}
</script>

</body>
</html>
