<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia de San Valentín ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at top, #1a1a2e, #000);
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

h1 {
    margin-top: 100px;
    font-size: 40px;
}

p {
    font-size: 20px;
}

.stars {
    width: 100%;
    height: 100%;
    position: absolute;
    background: transparent;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: twinkle 2s infinite;
}

@keyframes twinkle {
    0% {opacity: 0;}
    50% {opacity: 1;}
    100% {opacity: 0;}
}

.heart {
    font-size: 50px;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% {transform: scale(1);}
    50% {transform: scale(1.2);}
    100% {transform: scale(1);}
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<h1>🌌 Galaxia de San Valentín</h1>
<p>Este pequeño universo es solo para ti ❤️</p>
<div class="heart">💖</div>

<script>
// Crear estrellas aleatorias
const starsContainer = document.getElementById("stars");

for (let i = 0; i < 100; i++) {
    let star = document.createElement("div");
    star.classList.add("star");

    star.style.top = Math.random() * window.innerHeight + "px";
    star.style.left = Math.random() * window.innerWidth + "px";

    starsContainer.appendChild(star);
}
</script>

</body>
</html>
